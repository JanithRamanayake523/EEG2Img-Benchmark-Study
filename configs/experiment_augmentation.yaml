# Augmentation Study Configuration
# Test the impact of data augmentation strategies

name: augmentation_study_full
description: Test full augmentation with MixUp and CutMix
seed: 42
device: cuda
save_dir: results

# Dataset configuration
dataset:
  name: BCI-IV-2a
  file_path: data/BCI_IV_2a.hdf5
  split_ratio: 0.8
  validation_split: 0.1

# Full augmentation pipeline
augmentation:
  enabled: true
  transforms:
    - name: horizontal_flip
      enabled: true
      p: 0.5
    - name: vertical_flip
      enabled: true
      p: 0.3
    - name: rotation
      enabled: true
      degrees: 20
    - name: brightness
      enabled: true
      factor: 0.2
    - name: contrast
      enabled: true
      factor: 0.2
  mixup_alpha: 1.0
  cutmix_alpha: 1.0

# Model configuration
models:
  - name: resnet18
    architecture: resnet18
    num_classes: 4
    in_channels: 25
    pretrained: false

# Optimizer configuration
optimizer:
  name: adam
  learning_rate: 0.001
  weight_decay: 1.0e-4
  momentum: 0.9

# Training configuration
training:
  epochs: 100
  batch_size: 32
  num_workers: 0
  early_stopping_patience: 10
  mixed_precision: false
  gradient_accumulation_steps: 1

# Evaluation configuration
evaluation:
  metrics:
    - accuracy
    - f1
    - auc
  robustness_tests: true
  statistical_tests: true
  visualization: true
